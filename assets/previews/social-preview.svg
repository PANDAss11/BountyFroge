<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.5"/>

  <!-- decorative circuit lines -->
  <g stroke="#22d3ee" stroke-width="1.5" opacity="0.25" fill="none">
    <path d="M0 60 H180 L210 90 H420"/>
    <path d="M1280 240 H1080 L1050 210 H860"/>
    <path d="M0 280 H140 L165 255 H320"/>
  </g>

  <!-- Shield / target emblem -->
  <g transform="translate(90,95)">
    <path d="M65 0 L130 25 V70 C130 115 100 140 65 155 C30 140 0 115 0 70 V25 Z"
          fill="#0f172a" stroke="url(#accentGrad)" stroke-width="4"/>
    <circle cx="65" cy="70" r="34" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.8"/>
    <circle cx="65" cy="70" r="18" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.9"/>
    <circle cx="65" cy="70" r="5" fill="#22d3ee"/>
    <path d="M40 45 L48 53 M90 45 L82 53 M40 95 L48 87 M90 95 L82 87"
          stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title block -->
  <g transform="translate(280,110)">
    <text x="0" y="0" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58"
          font-weight="700" fill="#f8fafc" letter-spacing="1">Bounty<tspan fill="url(#accentGrad)">Forge</tspan></text>
    <text x="2" y="42" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19"
          fill="#94a3b8" letter-spacing="0.5">Templates &amp; Methodologies for Bug Bounty and Offensive Security Research</text>
    <g transform="translate(2,68)" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#64748b">
      <text x="0" y="0">RECON</text>
      <text x="90" y="0">·</text>
      <text x="105" y="0">EXPLOITATION</text>
      <text x="245" y="0">·</text>
      <text x="260" y="0">REPORTING</text>
      <text x="380" y="0">·</text>
      <text x="395" y="0">METHODOLOGY</text>
    </g>
  </g>

  <rect x="0" y="312" width="1280" height="8" fill="url(#accentGrad)"/>
</svg>
